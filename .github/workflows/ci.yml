name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install AutoHotkey v2 (for the bundled runtime)
        shell: pwsh
        run: |
          choco install autohotkey -y --no-progress
          # Verify the runtime exe is where we expect it
          $ahkPath = "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe"
          if (-not (Test-Path $ahkPath)) {
              # Choco sometimes installs to a different path; search.
              $candidates = Get-ChildItem -Path "C:\Program Files\AutoHotkey" -Recurse -Filter "AutoHotkey64.exe" -ErrorAction SilentlyContinue
              if ($candidates) {
                  $ahkPath = $candidates[0].FullName
                  Write-Host "Found AutoHotkey64.exe at: $ahkPath"
              } else {
                  throw "AutoHotkey64.exe not found after install"
              }
          }
          # Persist the path for downstream steps
          "AHK64=$ahkPath" >> $env:GITHUB_ENV

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          wix --version
          wix eula accept wix7
          wix extension add --global WixToolset.Util.wixext
          wix extension add --global WixToolset.Bal.wixext
          wix extension add --global WixToolset.NetFx.wixext
          # Workaround for WiX 7 Bal extension packaging: the downloaded DLL is named
          # WixToolset.BootstrapperApplications.wixext.dll but wix looks for WixToolset.Bal.wixext.dll.
          $cache = "$env:USERPROFILE\.wix\extensions\WixToolset.Bal.wixext"
          if (Test-Path $cache) {
            $actualDll = Get-ChildItem -Path $cache -Recurse -Filter "WixToolset.BootstrapperApplications.wixext.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($actualDll) {
              $expectedPath = Join-Path $actualDll.Directory.FullName "WixToolset.Bal.wixext.dll"
              if (-not (Test-Path $expectedPath)) {
                Copy-Item $actualDll.FullName $expectedPath -Force
                Write-Host "Renamed Bal DLL: $($actualDll.FullName) -> WixToolset.Bal.wixext.dll"
              }
            }
          }
          wix extension list --global

      - name: Build solution
        shell: pwsh
        run: dotnet build src/GraceKeeper.sln -c Release -p:Version=0.0.0.0

      - name: Run xUnit tests
        shell: pwsh
        run: dotnet test src/GraceKeeper.Core.Tests/GraceKeeper.Core.Tests.csproj -c Release --no-build

      - name: Stage AHK runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer/staging -Force | Out-Null
          Copy-Item $env:AHK64 installer/staging/AutoHotkey64.exe -Force
          Get-Item installer/staging/AutoHotkey64.exe | Select-Object Name, Length

      - name: Build inner MSI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer/bin/dev -Force | Out-Null
          cd installer
          wix build Product.wxs -d Version=0.0.0-ci -ext WixToolset.Util.wixext -arch x64 -o bin/dev/GraceKeeper-0.0.0-ci.msi
          Get-Item bin/dev/GraceKeeper-0.0.0-ci.msi | Select-Object Length

      - name: Build Burn bundle
        shell: pwsh
        run: |
          $mbanative = "$env:USERPROFILE\.nuget\packages\wixtoolset.mba.core\4.0.6\runtimes\win-x64\native\mbanative.dll"
          if (-not (Test-Path $mbanative)) { throw "mbanative.dll not found at '$mbanative' (was dotnet restore run?)" }
          cd installer
          wix build Bundle.wxs -d Version=0.0.0-ci -d mbanative=$mbanative -ext WixToolset.Util.wixext -ext WixToolset.Bal.wixext -ext WixToolset.NetFx.wixext -arch x64 -o ../GraceKeeper-0.0.0-ci.exe
          Get-Item ../GraceKeeper-0.0.0-ci.exe | Select-Object Length

      - name: Upload bundle as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GraceKeeper-CI-Bundle
          path: GraceKeeper-0.0.0-ci.exe
          retention-days: 7
